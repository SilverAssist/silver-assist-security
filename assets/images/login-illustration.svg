<svg class="silver-login-illustration" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
	<linearGradient id="sky-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
		<stop offset="0%" style="stop-color:#0a1628"/>
		<stop offset="100%" style="stop-color:#1a2a4a"/>
	</linearGradient>
</defs>
<!-- Stars -->
<circle cx="50" cy="60" r="1.5" fill="white" opacity="0.6"/>
<circle cx="120" cy="40" r="1" fill="white" opacity="0.4"/>
<circle cx="200" cy="30" r="1.5" fill="white" opacity="0.7"/>
<circle cx="280" cy="50" r="1" fill="white" opacity="0.5"/>
<circle cx="350" cy="70" r="1.5" fill="white" opacity="0.6"/>
<circle cx="80" cy="120" r="1" fill="white" opacity="0.3"/>
<circle cx="320" cy="110" r="1" fill="white" opacity="0.4"/>
<circle cx="160" cy="90" r="1.5" fill="white" opacity="0.5"/>
<!-- Mountains -->
<path d="M0 320 L80 220 L160 280 L240 180 L320 250 L400 200 L400 400 L0 400 Z" fill="#0d1f3c" opacity="0.8"/>
<path d="M0 360 L100 280 L200 320 L300 240 L400 300 L400 400 L0 400 Z" fill="#122a4a" opacity="0.6"/>
<!-- Rocket -->
<g transform="translate(160, 100) scale(0.5)">
	<path d="M80 20 C80 20 60 60 60 120 L100 120 C100 60 80 20 80 20 Z" fill="white"/>
	<path d="M60 120 L60 160 L80 140 L100 160 L100 120 Z" fill="#00D1FF"/>
	<circle cx="80" cy="80" r="10" fill="#00D1FF"/>
	<path d="M60 90 C40 100 40 130 50 140 L60 120 Z" fill="#00D1FF" opacity="0.7"/>
	<path d="M100 90 C120 100 120 130 110 140 L100 120 Z" fill="#00D1FF" opacity="0.7"/>
	<!-- Flame -->
	<path d="M70 160 L80 200 L90 160 Z" fill="#FF6B35" opacity="0.8"/>
	<path d="M74 160 L80 185 L86 160 Z" fill="#FFD700" opacity="0.9"/>
</g>
<!-- Clouds -->
<ellipse cx="80" cy="250" rx="40" ry="10" fill="white" opacity="0.05"/>
<ellipse cx="320" cy="200" rx="50" ry="12" fill="white" opacity="0.04"/>
</svg>
